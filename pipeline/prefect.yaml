# Prefect Cloud: deploy from `pipeline/` after `prefect cloud login`.
# Pull clones public `main`. Work pool must exist (e.g. `prefect work-pool create default
# --type prefect:managed`).
#
# Managed workers do not read repo `.env`. Secrets are passed as `job_variables.env` below,
# using deploy-time shell substitution (`{{ $VAR }}`). Before `prefect deploy`, load the same
# keys you use locally (do not commit real values into git):
#   cd repo-root && set -a && source .env && set +a && cd pipeline && prefect deploy --prefect-file prefect.yaml --name Daily_G10_Alpha_Engine
# Optional Alpha Vantage: add `ALPHAVANTAGE_API_KEY` under `job_variables.env` in the Prefect
# UI (or extend this file with `{{ $ALPHAVANTAGE_API_KEY }}` once that var is always set when deploying).

prefect-version: "3.0"
name: fx-regime-lab-pipeline

pull:
  - prefect.deployments.steps.git_clone:
      id: clone
      repository: https://github.com/fxregimelab/fx-regime-lab.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      id: install-deps
      # PEP 668 images: upgrade yfinance/websockets in system site-packages before editable install.
      script: >-
        pip install "websockets>=14.0" "yfinance>=0.2.65" --upgrade --break-system-packages
        && pip install -e . --break-system-packages
      directory: "{{ clone.directory }}/pipeline"
      stream_output: true
      shell: true
  - prefect.deployments.steps.set_working_directory:
      directory: "{{ clone.directory }}/pipeline"

deployments:
  - name: Daily_G10_Alpha_Engine
    description: Automated 24h G10 FX Regime Context Generation
    entrypoint: src/scheduler/orchestrator.py:run_daily
    schedule:
      interval: 86400
    work_pool:
      name: default
      job_variables:
        # Managed workers: align websockets with yfinance before pull-step pip install.
        pip_packages:
          - websockets>=13.0
        # Injected into the flow run process (required by `run_daily` / `_require_pipeline_runtime_env`).
        env:
          SUPABASE_URL: "{{ $SUPABASE_URL }}"
          SUPABASE_SERVICE_ROLE_KEY: "{{ $SUPABASE_SERVICE_ROLE_KEY }}"
          FRED_API_KEY: "{{ $FRED_API_KEY }}"
          OPENROUTER_API_KEY: "{{ $OPENROUTER_API_KEY }}"
