name: Daily FX Brief

on:
  schedule:
    # 23:00 UTC = 04:30 IST (next morning) = 30 min after NY close (22:30 UTC)
    # Runs every day — weekends reuse Friday data, giving a fresh Saturday/Sunday brief
    - cron: '0 23 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push index.html back to repo

concurrency:
  group: daily-brief
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          if [ -z "${{ secrets.FRED_API_KEY }}" ]; then
            echo "ERROR: FRED_API_KEY secret is not set in repo settings"
            exit 1
          fi
          echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}" > .env
          if [ -n "${{ secrets.NOTION_TOKEN }}" ]; then
            echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> .env
          fi
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          fi
          if [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          fi
          if [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          fi
          if [ -n "${{ secrets.CME_API_KEY }}" ]; then
            echo "CME_API_KEY=${{ secrets.CME_API_KEY }}" >> .env
          fi

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run pipeline (skip deploy — handled below)
        run: |
          # First attempt — capture exit code explicitly
          if python run.py --skip deploy; then
            echo "RUN_OK=true" >> "$GITHUB_ENV"
          else
            echo "First attempt failed, retrying in 60s…"
            sleep 60
            python run.py --skip deploy
          fi

      - name: Verify brief was generated
        run: |
          SLUG=$(date -u +%Y%m%d)
          if [ ! -f "briefs/brief_${SLUG}.html" ]; then
            echo "ERROR: briefs/brief_${SLUG}.html not found"
            exit 1
          fi
          echo "brief_${SLUG}.html found OK"

      - name: Publish brief to site/ for Cloudflare
        run: python scripts/publish_brief_for_site.py

      - name: Deploy to GitHub Pages
        run: python deploy.py

      # Deploy Worker + site/ static assets (see wrangler.toml, site/CLOUDFLARE_SETUP.md).
      # Uses `wrangler deploy`, not `pages deploy` — this repo has no separate Pages project named fx-regime-lab.
      # Token needs Workers Scripts (Edit), not Pages-only.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare (Worker + site assets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
