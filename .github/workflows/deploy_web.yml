name: Deploy Web (Next.js)

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install wrangler globally
        run: npm install -g wrangler

      # Linux runner (bash) — same class of environment as WSL; do not use Windows PowerShell for next-on-pages.
      - name: Build Next.js (next-on-pages)
        working-directory: web
        run: npm ci && npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        id: pages_deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler pages deploy web/.vercel/output/static --project-name=fx-regime-lab 2>&1 | tee deploy_output.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.pages\.dev[^[:space:]]*' deploy_output.txt | head -1 || true)
          if [ -z "$URL" ]; then
            URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.pages\.dev' deploy_output.txt | head -1 || true)
          fi
          if [ -n "$URL" ]; then
            echo "deployment_url=$URL" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deployment URL::$URL"
          fi

      - name: Print deployment URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "### Deployment URL" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.pages_deploy.outputs.deployment_url }}" ]; then
            echo "${{ steps.pages_deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_See **Deploy to Cloudflare Pages** step log for the \`*.pages.dev\` URL._" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Custom domain (when configured): https://fxregimelab.com" >> "$GITHUB_STEP_SUMMARY"
          echo "Listing recent deployments:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx wrangler pages deployment list --project-name=fx-regime-lab 2>&1 | head -40 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
