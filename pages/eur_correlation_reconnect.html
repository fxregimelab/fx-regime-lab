<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EUR/USD Regime Correlation — FX Regime Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060C18;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    #container {
      width: 1200px;
      height: 500px;
      background: #0B1120;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #E0E6ED;
      display: flex;
      flex-direction: column;
      padding: 18px 28px 12px 28px;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 38px;
      flex-shrink: 0;
    }

    #brand {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 26px;
      width: auto;
      display: block;
      opacity: 0.92;
    }

    #title {
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      letter-spacing: -0.016em;
      line-height: 1.3;
    }

    /* ── Chart area ─────────────────────────────────────── */
    #chart-wrap {
      flex: 1;
      position: relative;
      margin-top: 10px;
      min-height: 0;
    }

    /* ── Legend ─────────────────────────────────────────── */
    #legend {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 500;
      color: #A0B4CC;
    }

    .legend-swatch {
      width: 22px;
      height: 2.5px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Footer ─────────────────────────────────────────── */
    #footer {
      flex-shrink: 0;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 4px;
    }

    #substack {
      font-size: 11px;
      color: #4A5568;
      letter-spacing: 0.025em;
    }
  </style>
</head>
<body>
  <div id="container">

    <div id="header">
      <img id="brand" src="logos/wordmark without bg.png" alt="FX Regime Lab">
      <div id="title">EUR/USD Regime Correlation &mdash; The Reconnection Is Forming</div>
    </div>

    <div id="chart-wrap">
      <canvas id="corrChart"></canvas>
      <div id="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:#4A90D9;"></div>
          <span>60-Day Correlation</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#00E5A0;"></div>
          <span>20-Day Correlation</span>
        </div>
      </div>
    </div>

    <div id="footer">
      <span id="substack">fxregimelab.substack.com</span>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <script>
  // ─── DATA ─────────────────────────────────────────────────────────────────────
  // Source: data/latest_with_cot.csv  (EURUSD_spread_corr_60d, EURUSD_corr_20d)
  // Range : 2025-10-01 → 2026-03-20  (121 trading days)

  const dates = [
    '2025-10-01','2025-10-02','2025-10-03','2025-10-06','2025-10-07',
    '2025-10-08','2025-10-09','2025-10-10','2025-10-13','2025-10-14',
    '2025-10-15','2025-10-16','2025-10-17','2025-10-20','2025-10-21',
    '2025-10-22','2025-10-23','2025-10-24','2025-10-27','2025-10-28',
    '2025-10-29','2025-10-30','2025-10-31','2025-11-03','2025-11-04',
    '2025-11-05','2025-11-06','2025-11-07','2025-11-10','2025-11-11',
    '2025-11-12','2025-11-13','2025-11-14','2025-11-17','2025-11-18',
    '2025-11-19','2025-11-20','2025-11-21','2025-11-24','2025-11-25',
    '2025-11-26','2025-11-27','2025-11-28','2025-12-01','2025-12-02',
    '2025-12-03','2025-12-04','2025-12-05','2025-12-08','2025-12-09',
    '2025-12-10','2025-12-11','2025-12-12','2025-12-15','2025-12-16',
    '2025-12-17','2025-12-18','2025-12-19','2025-12-22','2025-12-23',
    '2025-12-24','2025-12-26','2025-12-29','2025-12-30','2025-12-31',
    '2026-01-02','2026-01-05','2026-01-06','2026-01-07','2026-01-08',
    '2026-01-09','2026-01-12','2026-01-13','2026-01-14','2026-01-15',
    '2026-01-16','2026-01-19','2026-01-20','2026-01-21','2026-01-22',
    '2026-01-23','2026-01-26','2026-01-27','2026-01-28','2026-01-29',
    '2026-01-30','2026-02-02','2026-02-03','2026-02-04','2026-02-05',
    '2026-02-06','2026-02-09','2026-02-10','2026-02-11','2026-02-12',
    '2026-02-13','2026-02-16','2026-02-17','2026-02-18','2026-02-19',
    '2026-02-20','2026-02-23','2026-02-24','2026-02-25','2026-02-26',
    '2026-02-27','2026-03-02','2026-03-03','2026-03-04','2026-03-05',
    '2026-03-06','2026-03-09','2026-03-10','2026-03-11','2026-03-12',
    '2026-03-13','2026-03-16','2026-03-17','2026-03-18','2026-03-19',
    '2026-03-20'
  ]; // 121 entries

  // 60-day correlation: EUR/USD rate vs spread
  const corr60 = [
     0.208,  0.2078,  0.2176,  0.2124,  0.2491,  0.2082,  0.2031,  0.2226,
     0.23,   0.2318,  0.2293,  0.2147,  0.2261,  0.2375,  0.1251,  0.1517,
     0.1739,  0.1757,  0.1529,  0.151,   0.145,   0.1248,  0.1271,  0.1175,
     0.1082,  0.0754,  0.0494,  0.0232,  0.0081, -0.0007, -0.0071, -0.008,
    -0.0337, -0.0164,  0.0057,  0.0084,  0.0356,  0.0367,  0.0482,  0.0436,
     0.013,   0.0207,  0.0196,  0.0389,  0.0277, -0.0099,  0.0076, -0.0016,
    -0.0007,  0.0032, -0.0549, -0.0125,  0.0064,  0.0087,  0.0231,  0.0136,
     0.0226,  0.0777,  0.0902,  0.1254,  0.1117,  0.1123,  0.1166,  0.1262,
     0.104,   0.1463,  0.1464,  0.0901,  0.0719,  0.0736,  0.0459,  0.0814,
     0.0244,  0.0052,  0.0118, -0.0449, -0.0483, -0.0343, -0.1067, -0.0949,
    -0.1499, -0.1027, -0.1017, -0.0148, -0.0227,  0.0155, -0.0178,  0.0324,
     0.0419,  0.0578,  0.0602,  0.059,   0.0348,  0.0244,  0.0421,  0.0439,
     0.0101, -0.0005, -0.0119,  0.0024,  0.0096, -0.0271, -0.04,  -0.0419,
    -0.0434, -0.0336, -0.0733, -0.0128, -0.0665, -0.0742, -0.0856, -0.0647,
    -0.0091, -0.0084, -0.0235, -0.0225,  0.0021, -0.004,   0.0066, -0.0058,
     0.0055
  ]; // 121 entries

  // 20-day correlation: faster signal
  const corr20 = [
     0.0181,  0.0373,  0.0048,  0.0442,  0.0189, -0.1409, -0.133,  -0.003,
     0.044,   0.0549, -0.0091, -0.1425, -0.0699, -0.0377,  0.027,   0.0271,
     0.0477,  0.1488,  0.1817,  0.1505,  0.1758,  0.1493,  0.162,   0.1479,
     0.1696,  0.1742,  0.1203, -0.0564, -0.1113, -0.1003, -0.227,  -0.1004,
    -0.203,  -0.255,  -0.2513, -0.3278, -0.2016, -0.179,  -0.1534, -0.1376,
    -0.2733, -0.1762, -0.1787, -0.1229, -0.1447,  0.0634,  0.195,   0.2322,
     0.2902,  0.262,   0.398,   0.5068,  0.5446,  0.507,   0.4808,  0.4703,
     0.3854,  0.337,   0.3058,  0.4104,  0.4171,  0.4222,  0.3872,  0.3925,
     0.271,   0.2881,  0.2382,  0.2631,  0.267,   0.2495,  0.2387,  0.039,
    -0.1099, -0.1047, -0.0035, -0.0888, -0.1052, -0.0851, -0.337,  -0.462,
    -0.5014, -0.4175, -0.4029, -0.2307, -0.178,  -0.1897, -0.2463, -0.1543,
    -0.158,  -0.0802, -0.1121, -0.0722, -0.0913, -0.11,   -0.0521,  0.0159,
     0.0149, -0.0113,  0.0757,  0.0958,  0.1604,  0.0446,  0.0019, -0.1868,
    -0.1778, -0.17,   -0.1655, -0.0717, -0.2424, -0.3034, -0.2918, -0.1768,
     0.1028,  0.0999,  0.042,   0.0476,  0.1059,  0.0784,  0.1022,  0.1164,
     0.1127
  ]; // 121 entries

  // Latest values (last data point: 2026-03-20)
  const LAST_IDX   = dates.length - 1; // 120
  const LATEST_60D = corr60[LAST_IDX]; //  0.0055
  const LATEST_20D = corr20[LAST_IDX]; //  0.1127

  // ─── TICK FILTER ──────────────────────────────────────────────────────────────
  // Monthly + mid-month ticks keep the axis readable over 6 months
  const tickSet = new Set([
    '2025-10-01','2025-10-15',
    '2025-11-03','2025-11-17',
    '2025-12-01','2025-12-15',
    '2026-01-02','2026-01-16',
    '2026-02-02','2026-02-16',
    '2026-03-02','2026-03-16'
  ]);

  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(iso) {
    const p = iso.split('-');
    return `${MON[+p[1]-1]} ${+p[2]}`;
  }

  // ─── SHADED ZONE PLUGIN ───────────────────────────────────────────────────────
  // Draws two filled rect zones directly onto the canvas before datasets are drawn:
  //   - Transition zone : y=0  → y=+0.20  (very subtle navy)
  //   - Fundamental zone: y=+0.20 → top   (very subtle green)
  const zoneBgPlugin = {
    id: 'zoneBg',
    beforeDatasetsDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea) return;
      const { left, right, top } = chartArea;
      const Y = scales.y;

      const y0   = Y.getPixelForValue(0);
      const y020 = Y.getPixelForValue(0.20);
      const yTop = top;

      ctx.save();

      // Transition zone  [0, +0.20]
      ctx.fillStyle = 'rgba(26, 35, 64, 0.55)';
      ctx.fillRect(left, y020, right - left, y0 - y020);

      // Fundamental zone [+0.20, top]
      ctx.fillStyle = 'rgba(0, 229, 160, 0.10)';
      ctx.fillRect(left, yTop, right - left, y020 - yTop);

      ctx.restore();
    }
  };

  // ─── HELPERS ──────────────────────────────────────────────────────────────────
  const FONT  = "'Inter', system-ui, -apple-system, sans-serif";
  const GRID  = '#1A2340';
  const AXIS  = '#607B99';
  const TEXT  = '#E0E6ED';
  const BG    = '#0B1120';

  // ─── ANNOTATIONS ──────────────────────────────────────────────────────────────
  const annotations = {
    // Zero line
    zeroLine: {
      type: 'line',
      yMin: 0, yMax: 0,
      borderColor: 'rgba(74, 85, 104, 0.55)',
      borderWidth: 1,
      borderDash: []
    },

    // Fundamental regime threshold at +0.20
    fundLine: {
      type: 'line',
      yMin: 0.20, yMax: 0.20,
      borderColor: 'rgba(0, 229, 160, 0.50)',
      borderWidth: 1.5,
      borderDash: [6, 4],
      label: {
        display: true,
        content: 'FUNDAMENTAL REGIME',
        position: 'end',
        xAdjust: -10,
        yAdjust: -11,
        color: 'rgba(0, 229, 160, 0.80)',
        backgroundColor: 'transparent',
        font: { size: 9.5, family: FONT, weight: '500' }
      }
    },

    // 60D latest value pin — shifted left so label text isn't clipped at canvas edge
    pin60: {
      type: 'label',
      xValue: LAST_IDX,
      yValue: LATEST_60D,
      content: `60D: ${LATEST_60D > 0 ? '+' : ''}${LATEST_60D.toFixed(3)}`,
      color: '#4A90D9',
      backgroundColor: 'rgba(11, 17, 32, 0.88)',
      borderRadius: 3,
      padding: { x: 6, y: 3 },
      font: { size: 11, family: FONT, weight: '600' },
      xAdjust: -70,
      yAdjust: 22,
      callout: { display: false }
    },

    // 20D latest value pin with arrow character (leading signal)
    pin20: {
      type: 'label',
      xValue: LAST_IDX,
      yValue: LATEST_20D,
      content: `20D: +${LATEST_20D.toFixed(3)} ↑`,
      color: '#00E5A0',
      backgroundColor: 'rgba(11, 17, 32, 0.88)',
      borderRadius: 3,
      padding: { x: 6, y: 3 },
      font: { size: 11, family: FONT, weight: '600' },
      xAdjust: -70,
      yAdjust: -22,
      callout: { display: false }
    }
  };

  // ─── CHART ────────────────────────────────────────────────────────────────────
  const ctx = document.getElementById('corrChart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    plugins: [zoneBgPlugin],
    data: {
      labels: dates,
      datasets: [
        {
          // 60-day correlation — slow, structural signal
          label: '60-Day Correlation',
          data: corr60,
          borderColor: '#4A90D9',
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
          tension: 0.25,
          order: 2
        },
        {
          // 20-day correlation — fast, leading signal
          label: '20-Day Correlation',
          data: corr20,
          borderColor: '#00E5A0',
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
          tension: 0.25,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      events: [],
      layout: { padding: { top: 28, right: 145, bottom: 0, left: 0 } },
      plugins: {
        legend:  { display: false },
        tooltip: { enabled: false },
        annotation: { annotations }
      },
      scales: {
        x: {
          type: 'category',
          grid: { color: GRID, tickLength: 4 },
          border: { display: false },
          ticks: {
            display: true,
            color: AXIS,
            font: { size: 10, family: FONT },
            maxRotation: 0,
            padding: 4,
            callback(value, index) {
              const label = dates[index];
              if (!tickSet.has(label)) return null;
              return fmtDate(label);
            }
          }
        },
        y: {
          min: -0.6,
          max:  0.8,
          ticks: {
            color: AXIS,
            font: { size: 10, family: FONT },
            stepSize: 0.2,
            padding: 6,
            callback: v => v > 0 ? `+${v.toFixed(1)}` : v.toFixed(1)
          },
          grid: { color: GRID },
          border: { display: false },
          title: {
            display: true,
            text: 'Correlation',
            color: AXIS,
            font: { size: 10, family: FONT },
            padding: { bottom: 4 }
          }
        }
      }
    }
  });
  </script>
</body>
</html>
