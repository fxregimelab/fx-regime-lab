# Deploy static site + Worker when site assets or worker config change.
# The daily brief workflow also runs `wrangler deploy` after the full pipeline;
# this job keeps SEO files (sitemap, robots) and UI edits live without waiting for cron.
name: Deploy Cloudflare site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'workers/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy_cloudflare_site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-site-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare (Worker + site assets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
