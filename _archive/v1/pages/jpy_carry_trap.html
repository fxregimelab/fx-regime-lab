<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USD/JPY — Crowded Short at the Ceiling | FX Regime Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060C18;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    #container {
      width: 1200px;
      height: 550px;
      background: #0B1120;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #E0E6ED;
      display: flex;
      flex-direction: column;
      padding: 18px 28px 12px 28px;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 38px;
      flex-shrink: 0;
    }

    #brand {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 26px;
      width: auto;
      display: block;
      opacity: 0.92;
    }

    #title {
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      letter-spacing: -0.016em;
    }

    /* ── Chart area ─────────────────────────────────────── */
    #chart-wrap {
      flex: 1;
      position: relative;
      margin-top: 10px;
      min-height: 0;
    }

    /* ── Legend ─────────────────────────────────────────── */
    #legend {
      position: absolute;
      top: 6px;
      right: 28px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 500;
      color: #A0B4CC;
    }

    .legend-swatch {
      width: 22px;
      height: 2.5px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Footer ─────────────────────────────────────────── */
    #footer {
      flex-shrink: 0;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 4px;
    }

    #substack {
      font-size: 11px;
      color: #4A5568;
      letter-spacing: 0.025em;
    }
  </style>
</head>
<body>
  <div id="container">

    <div id="header">
      <img id="brand" src="logos/wordmark without bg.png" alt="FX Regime Lab">
      <div id="title">USD/JPY &mdash; Crowded Short at the Ceiling</div>
    </div>

    <div id="chart-wrap">
      <canvas id="jpyChart"></canvas>
      <div id="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:#FF9F43;"></div>
          <span>USD/JPY (left axis)</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:rgba(255,255,255,0.65);"></div>
          <span>JPY Lev. Positioning %ile (right axis)</span>
        </div>
      </div>
    </div>

    <div id="footer">
      <span id="substack">fxregimelab.substack.com</span>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <script>
  // ─── DATA ─────────────────────────────────────────────────────────────────────
  // Source: data/latest_with_cot.csv
  // Range : 2025-11-03 → 2026-03-20  (98 trading days)

  const dates = [
    '2025-11-03','2025-11-04','2025-11-05','2025-11-06','2025-11-07',
    '2025-11-10','2025-11-11','2025-11-12','2025-11-13','2025-11-14',
    '2025-11-17','2025-11-18','2025-11-19','2025-11-20','2025-11-21',
    '2025-11-24','2025-11-25','2025-11-26','2025-11-27','2025-11-28',
    '2025-12-01','2025-12-02','2025-12-03','2025-12-04','2025-12-05',
    '2025-12-08','2025-12-09','2025-12-10','2025-12-11','2025-12-12',
    '2025-12-15','2025-12-16','2025-12-17','2025-12-18','2025-12-19',
    '2025-12-22','2025-12-23','2025-12-24','2025-12-26','2025-12-29',
    '2025-12-30','2025-12-31',
    '2026-01-02','2026-01-05','2026-01-06','2026-01-07','2026-01-08',
    '2026-01-09','2026-01-12','2026-01-13','2026-01-14','2026-01-15',
    '2026-01-16','2026-01-19','2026-01-20','2026-01-21','2026-01-22',
    '2026-01-23','2026-01-26','2026-01-27','2026-01-28','2026-01-29',
    '2026-01-30','2026-02-02','2026-02-03','2026-02-04','2026-02-05',
    '2026-02-06','2026-02-09','2026-02-10','2026-02-11','2026-02-12',
    '2026-02-13','2026-02-16','2026-02-17','2026-02-18','2026-02-19',
    '2026-02-20','2026-02-23','2026-02-24','2026-02-25','2026-02-26',
    '2026-02-27','2026-03-02','2026-03-03','2026-03-04','2026-03-05',
    '2026-03-06','2026-03-09','2026-03-10','2026-03-11','2026-03-12',
    '2026-03-13','2026-03-16','2026-03-17','2026-03-18','2026-03-19',
    '2026-03-20'
  ]; // 98 entries

  // USD/JPY price — left axis
  const jpyPrice = [
    154.195, 154.204, 153.557, 154.073, 152.948,  // Nov 3–7
    153.817, 154.146, 154.075, 154.713, 154.633,  // Nov 10–14
    154.585, 155.273, 155.548, 156.992, 157.369,  // Nov 17–21
    156.688, 156.939, 156.23,  156.239, 156.284,  // Nov 24–28
    155.928, 155.557, 155.807, 155.107, 155.142,  // Dec 1–5
    155.34,  155.844, 156.838, 155.79,  155.567,  // Dec 8–12
    155.888, 155.015, 154.778, 155.495, 155.586,  // Dec 15–19
    157.676, 156.877, 156.176, 156.09,  156.463,  // Dec 22–29
    156.013, 156.413,                              // Dec 30–31
    156.731, 156.989, 156.626, 156.68,  156.731,  // Jan 2–8
    156.88,  158.149, 157.986, 159.179, 158.402,  // Jan 9–15
    158.596, 157.535, 158.177, 158.162, 158.456,  // Jan 16–22
    158.501, 155.166, 154.336, 152.453, 153.096,  // Jan 23–29
    153.162, 155.202, 155.443, 155.799, 156.917,  // Jan 30–Feb 5
    156.784, 157.244, 156.132, 154.482, 153.269,  // Feb 6–12
    152.821, 152.779, 153.609, 153.149, 154.693,  // Feb 13–19
    155.16,  154.339, 154.635, 155.88,  156.2,    // Feb 20–26
    155.859, 156.633, 157.257, 157.773, 156.983,  // Feb 27–Mar 5
    157.534, 158.427, 157.848, 158.114, 159.075,  // Mar 6–12
    159.206, 159.568, 159.105, 158.889, 159.795,  // Mar 13–19
    157.924                                        // Mar 20
  ]; // 98 entries

  // JPY leveraged money percentile rank — right axis
  const jpyPct = [
     36.31,  27.98,  27.98,  27.98,  27.98,  // Nov 3–7
     27.38,  27.38,  27.38,  27.38,  27.38,  // Nov 10–14
     27.38,  20.83,  20.83,  20.83,  20.83,  // Nov 17–21
     20.83,  31.55,  31.55,  31.55,  31.55,  // Nov 24–28
     31.55,  22.02,  22.02,  22.02,  22.02,  // Dec 1–5
     22.02,   6.55,   6.55,   6.55,   6.55,  // Dec 8–12
      6.55,   8.93,   8.93,   8.93,   8.93,  // Dec 15–19
      8.93,  10.71,  10.71,  10.71,  10.71,  // Dec 22–29
     13.10,  13.10,                           // Dec 30–31
     13.10,  13.10,  20.24,  20.24,  20.24,  // Jan 2–8
     20.24,  20.24,   4.17,   4.17,   4.17,  // Jan 9–15
      4.17,   4.17,   7.74,   7.74,   7.74,  // Jan 16–22
      7.74,   7.74,  16.07,  16.07,  16.07,  // Jan 23–29
     16.07,  16.07,  30.36,  30.36,  30.36,  // Jan 30–Feb 5
     30.36,  30.36,  30.95,  30.95,  30.95,  // Feb 6–12
     30.95,  30.95,  67.26,  67.26,  67.26,  // Feb 13–19
     67.26,  67.26,  69.64,  69.64,  69.64,  // Feb 20–26
     69.64,  69.64,  63.69,  63.69,  63.69,  // Feb 27–Mar 5
     63.69,  63.69,  36.90,  36.90,  36.90,  // Mar 6–12
     36.90,  36.90,  17.86,  17.86,  17.86,  // Mar 13–19
     17.86                                    // Mar 20
  ]; // 98 entries

  // Indices for key annotations
  const LAST_IDX  = dates.length - 1;  // 97 = Mar 20
  const PEAK_IDX  = 96;                // Mar 19: price=159.795, pct=17.86

  // ─── X-AXIS TICK FILTER ───────────────────────────────────────────────────────
  const tickSet = new Set([
    '2025-11-03','2025-11-17',
    '2025-12-01','2025-12-15',
    '2026-01-02','2026-01-20',
    '2026-02-02','2026-02-17',
    '2026-03-02','2026-03-17'
  ]);
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(iso) {
    const p = iso.split('-');
    return `${MON[+p[1]-1]} ${+p[2]}`;
  }

  // ─── AREA GRADIENT PLUGIN ─────────────────────────────────────────────────────
  // Fills the percentile area with: blue (#4A90D9, 10%) where > 30, red (#FF4757, 18%) where < 30.
  // Gradient is mapped vertically: yRight goes 0→100, so y=30 is at 70% from top.
  const pctAreaPlugin = {
    id: 'pctArea',
    afterLayout(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea) return;
      const yR = scales.yRight;
      if (!yR) return;
      const y30  = yR.getPixelForValue(30);
      const yTop = chartArea.top;
      const yBot = chartArea.bottom;
      const h = yBot - yTop;
      const t30 = Math.min(1, Math.max(0, (y30 - yTop) / h)); // fraction from top ≈ 0.70
      const grad = ctx.createLinearGradient(0, yTop, 0, yBot);
      grad.addColorStop(0,              'rgba( 74, 144, 217, 0.12)'); // y=100 → blue
      grad.addColorStop(Math.max(0, t30 - 0.015), 'rgba( 74, 144, 217, 0.08)');
      grad.addColorStop(Math.min(1, t30 + 0.015), 'rgba(255,  71,  87, 0.10)');
      grad.addColorStop(1,              'rgba(255,  71,  87, 0.28)'); // y=0   → deep red
      // Dataset index 0 = pct area fill
      chart.data.datasets[0].backgroundColor = grad;
    }
  };

  // ─── SHARED CONSTANTS ─────────────────────────────────────────────────────────
  const FONT = "'Inter', system-ui, -apple-system, sans-serif";
  const GRID = '#1A2340';
  const AXIS = '#607B99';
  const BG   = '#0B1120';

  // ─── ANNOTATIONS ──────────────────────────────────────────────────────────────
  const annotations = {

    // ── Price threshold: 160 BoJ Alert
    line160: {
      type: 'line',
      yMin: 160, yMax: 160,
      yScaleID: 'yLeft',
      borderColor: 'rgba(255, 71, 87, 0.70)',
      borderWidth: 1.5,
      borderDash: [6, 4],
      label: {
        display: true,
        content: '160 — BoJ ALERT',
        position: 'start',
        xAdjust: 10,
        yAdjust: -11,
        color: '#FF4757',
        backgroundColor: 'transparent',
        font: { size: 10, family: FONT, weight: '700' }
      }
    },

    // ── Price threshold: 155 Watch Zone
    line155: {
      type: 'line',
      yMin: 155, yMax: 155,
      yScaleID: 'yLeft',
      borderColor: 'rgba(255, 165, 2, 0.55)',
      borderWidth: 1.5,
      borderDash: [6, 4],
      label: {
        display: true,
        content: '155 — Watch Zone',
        position: 'start',
        xAdjust: 10,
        yAdjust: -11,
        color: '#FFA502',
        backgroundColor: 'transparent',
        font: { size: 10, family: FONT, weight: '500' }
      }
    },

    // ── "18th pct — CROWDED SHORT" label on right axis
    crowdedShortPin: {
      type: 'label',
      xValue: LAST_IDX,
      yValue: 17.86,
      yScaleID: 'yRight',
      content: '18th pct — CROWDED SHORT',
      color: '#FF4757',
      backgroundColor: 'rgba(11, 17, 32, 0.88)',
      borderRadius: 3,
      padding: { x: 7, y: 4 },
      font: { size: 10.5, family: FONT, weight: '600' },
      xAdjust: -110,
      yAdjust: 22,
      callout: { display: false }
    },

    // ── Main callout box: price + positioning at peak date (Mar 19)
    calloutBox: {
      type: 'label',
      xValue: PEAK_IDX,
      yValue: 159.795,
      yScaleID: 'yLeft',
      content: ['Price: 159.79', 'Positioning: 18th pct'],
      color: '#E0E6ED',
      backgroundColor: 'rgba(11, 17, 32, 0.94)',
      borderColor: 'rgba(255, 71, 87, 0.55)',
      borderWidth: 1,
      borderRadius: 4,
      padding: { x: 9, y: 6 },
      font: { size: 11, family: FONT, weight: '500' },
      xAdjust: -88,
      yAdjust: -30,
      callout: { display: false }
    }
  };

  // ─── CHART ────────────────────────────────────────────────────────────────────
  const ctx = document.getElementById('jpyChart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    plugins: [pctAreaPlugin],
    data: {
      labels: dates,
      datasets: [
        {
          // ── JPY lev percentile — area fill, rendered behind price line
          label: 'JPY Lev. Positioning %ile',
          data: jpyPct,
          yAxisID: 'yRight',
          borderColor: 'rgba(255, 255, 255, 0.55)',
          borderWidth: 1.2,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: 'origin',
          backgroundColor: 'rgba(255,71,87,0.15)', // overridden by pctAreaPlugin
          tension: 0.15,
          order: 2
        },
        {
          // ── USD/JPY price — solid line on top
          label: 'USD/JPY',
          data: jpyPrice,
          yAxisID: 'yLeft',
          borderColor: '#FF9F43',
          borderWidth: 2.2,
          pointRadius: dates.map((_, i) => i === PEAK_IDX ? 5 : 0),
          pointHoverRadius: 0,
          pointBackgroundColor: '#FF9F43',
          pointBorderColor: BG,
          pointBorderWidth: 2,
          fill: false,
          tension: 0.15,
          order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      events: [],
      layout: { padding: { top: 28, right: 24, bottom: 0, left: 0 } },
      plugins: {
        legend:  { display: false },
        tooltip: { enabled: false },
        annotation: { annotations }
      },
      scales: {
        x: {
          type: 'category',
          grid: { color: GRID, tickLength: 4 },
          border: { display: false },
          ticks: {
            color: AXIS,
            font: { size: 10, family: FONT },
            maxRotation: 0,
            padding: 4,
            callback(value, index) {
              const label = dates[index];
              if (!tickSet.has(label)) return null;
              return fmtDate(label);
            }
          }
        },
        yLeft: {
          type: 'linear',
          position: 'left',
          min: 148,
          max: 162,
          ticks: {
            color: AXIS,
            font: { size: 10, family: FONT },
            stepSize: 2,
            padding: 6,
            callback: v => v.toFixed(0)
          },
          grid: { color: GRID },
          border: { display: false },
          title: {
            display: true,
            text: 'USD/JPY',
            color: AXIS,
            font: { size: 10, family: FONT },
            padding: { bottom: 4 }
          }
        },
        yRight: {
          type: 'linear',
          position: 'right',
          min: 0,
          max: 100,
          ticks: {
            color: AXIS,
            font: { size: 10, family: FONT },
            stepSize: 10,
            padding: 6,
            callback: v => `${v}`
          },
          grid: { drawOnChartArea: false },  // no double grid lines
          border: { display: false },
          title: {
            display: true,
            text: 'Positioning %ile',
            color: AXIS,
            font: { size: 10, family: FONT },
            padding: { bottom: 4 }
          }
        }
      }
    }
  });
  </script>
</body>
</html>
