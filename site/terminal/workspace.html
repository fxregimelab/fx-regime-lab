<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workspace — Terminal · FX Regime Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/terminal/terminal.css" />
  <style>
    .ws-app {
      display: flex;
      height: calc(100vh - var(--term-nav-h, 48px));
      overflow: hidden;
    }
    .ws-sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface-primary);
      border-right: 1px solid var(--border-default);
      padding: 16px 0;
      overflow-y: auto;
    }
    .ws-sidebar__head {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 16px 12px;
    }
    .ws-cat { border-bottom: 1px solid var(--border-subtle); }
    .ws-cat__bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .ws-cat__bar:hover { background: var(--surface-elevated); }
    .ws-cat__chev {
      display: inline-block;
      transition: transform 0.2s ease;
      font-size: 10px;
      color: var(--text-muted);
    }
    .ws-cat.is-open .ws-cat__chev { transform: rotate(90deg); }
    .ws-cat__list { display: none; padding-bottom: 6px; }
    .ws-cat.is-open .ws-cat__list { display: block; }
    .ws-series {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px 6px 32px;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-primary);
    }
    .ws-series:hover { background: var(--surface-elevated); }
    .ws-series input { accent-color: var(--accent); width: 14px; height: 14px; }
    .ws-series__dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ws-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface-primary);
    }
    .ws-toolbar {
      flex-shrink: 0;
      min-height: 48px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      padding: 8px 16px;
      background: var(--surface-primary);
      border-bottom: 1px solid var(--border-default);
    }
    .ws-toolbar__row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 16px;
      min-height: 40px;
    }
    .ws-toolbar__dates {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 16px;
    }
    .ws-lab {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .ws-date {
      background: var(--surface-elevated);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: 6px 10px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-primary);
    }
    .ws-date:focus {
      outline: none;
      border-color: var(--accent);
    }
    .ws-compare-row {
      display: none;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding-top: 4px;
    }
    .ws-compare-row.is-visible { display: flex; }
    .ws-btn-ghost {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .ws-btn-ghost:hover { background: var(--surface-elevated); }
    .ws-btn-ghost.is-active {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border-default));
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }
    .ws-btn-compare {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .ws-btn-compare:hover { background: var(--surface-elevated); }
    .ws-btn-compare.is-on {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border-default));
    }
    .ws-toolbar__spacer { flex: 1; min-width: 8px; }
    .ws-range-group {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .ws-range {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 6px 10px;
      cursor: pointer;
    }
    .ws-range:hover { color: var(--text-secondary); }
    .ws-range.is-active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .ws-chart-wrap {
      flex: 1;
      min-height: 400px;
      padding: 12px 16px 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    #ws-chart {
      width: 100%;
      flex: 1;
      min-height: 400px;
      border: 1px solid var(--border-default);
      border-radius: var(--term-radius-sm);
      background: var(--bg-chart);
    }
  </style>
  <script src="/assets/supabase-env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/terminal/utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js" crossorigin="anonymous"></script>
  <script src="/assets/theme-switch.js" defer></script>
  <script src="/terminal/terminal-nav.js" defer></script>
  <script src="/terminal/echarts-config.js"></script>
  <script src="/terminal/data-client.js"></script>
  <script src="/terminal/chart-builder.js"></script>
  <script src="/terminal/workspace.js"></script>
</head>
<body class="theme-terminal">
  <a href="#ws-app" class="term-sr-only">Skip to workspace</a>

  <header class="term-nav" role="banner">
    <div class="term-nav__left">
      <a class="term-nav__brand" href="/terminal/">
        <img src="/assets/images/wordmark_without_bg.png" alt="FX Regime Lab" class="term-nav__wordmark" width="160" height="22" loading="eager" onerror="this.onerror=null;this.src='data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22210%22%20height%3D%2222%22%3E%3Ctext%20x%3D%220%22%20y%3D%2216%22%20fill%3D%22%23e8ede8%22%20font-family%3D%22IBM%20Plex%20Sans%2Csystem-ui%2Csans-serif%22%20font-size%3D%2213%22%20font-weight%3D%22600%22%3EFX%20Regime%20Lab%3C/text%3E%3C/svg%3E';" />
      </a>
      <span class="term-nav__pipe" aria-hidden="true">|</span>
      <span class="term-nav__product">Terminal</span>
    </div>
    <nav class="term-nav__tabs" aria-label="Terminal sections">
      <a class="term-nav__tab" href="/terminal/" data-path="/terminal/index">Home</a>
      <a class="term-nav__tab" href="/terminal/eurusd.html" data-path="/terminal/eurusd">EUR/USD</a>
      <a class="term-nav__tab" href="/terminal/usdjpy.html" data-path="/terminal/usdjpy">USD/JPY</a>
      <a class="term-nav__tab" href="/terminal/usdinr.html" data-path="/terminal/usdinr">USD/INR</a>
      <a class="term-nav__tab" href="/terminal/chartbuilder.html" data-path="/terminal/chartbuilder">Chart builder</a>
    </nav>
    <div class="term-nav__right">
      <div class="term-nav__live">
        <span class="term-nav__live-dot" aria-hidden="true"></span>
        <span class="term-nav__live-label">Live</span>
        <span class="term-nav__ts" id="term-pipeline-ts">Pipeline —</span>
      </div>
      <a class="term-nav__exit" href="/">← Exit Terminal</a>
    </div>
  </header>

  <div id="ws-app" class="ws-app">
    <aside class="ws-sidebar" aria-label="Data series">
      <div class="ws-sidebar__head">Data series</div>
      <div id="ws-sidebar-cats"></div>
    </aside>

    <section class="ws-main" aria-label="Analysis workspace">
      <div class="ws-toolbar">
        <div class="ws-toolbar__row">
          <div class="ws-toolbar__dates">
            <span class="ws-lab">From</span>
            <input type="date" class="ws-date" id="ws-from" />
            <span class="ws-lab">To</span>
            <input type="date" class="ws-date" id="ws-to" />
            <button type="button" class="ws-btn-compare" id="ws-compare-toggle" aria-pressed="false">
              Compare period
            </button>
          </div>
          <button type="button" class="ws-btn-ghost" id="ws-add-marker">Add marker</button>
          <button type="button" class="ws-btn-ghost" id="ws-add-ref">Add reference line</button>
          <div class="ws-toolbar__spacer"></div>
          <div class="ws-range-group" role="tablist" aria-label="Time shortcuts">
            <button type="button" class="ws-range" data-months="1">1M</button>
            <button type="button" class="ws-range" data-months="3">3M</button>
            <button type="button" class="ws-range" data-months="6">6M</button>
            <button type="button" class="ws-range" data-months="12">1Y</button>
            <button type="button" class="ws-range" data-months="24">2Y</button>
          </div>
        </div>
        <div class="ws-compare-row" id="ws-compare-row" aria-hidden="true">
          <span class="ws-lab">Compare from</span>
          <input type="date" class="ws-date" id="ws-from-b" />
          <span class="ws-lab">Compare to</span>
          <input type="date" class="ws-date" id="ws-to-b" />
        </div>
      </div>
      <div class="ws-chart-wrap">
        <div id="ws-chart" role="img" aria-label="Workspace chart"></div>
      </div>
    </section>
  </div>

  <script>
(function () {
  var CB = window.FXRLChartBuilder;
  var WS = window.FXRLWorkspace;
  if (!CB || !WS) return;

  var sidebar = document.getElementById('ws-sidebar-cats');
  var sm = WS.WorkspaceSeriesManager;

  var catTpl = CB.DATA_CATALOG.categories.map(function (cat) {
    var items = cat.series.map(function (s) {
      return (
        '<label class="ws-series" data-series-id="' + s.id + '">' +
        '<input type="checkbox" data-series-id="' + s.id + '" />' +
        '<span class="ws-series__dot" style="background:' + s.colour + '"></span>' +
        '<span>' + s.label + '</span></label>'
      );
    }).join('');
    return (
      '<div class="ws-cat is-open" data-cat-id="' + cat.id + '">' +
      '<div class="ws-cat__bar" role="button" tabindex="0">' +
      '<span class="ws-cat__chev" aria-hidden="true">▸</span>' +
      '<span>' + cat.label + '</span></div>' +
      '<div class="ws-cat__list">' + items + '</div></div>'
    );
  }).join('');
  sidebar.innerHTML = catTpl;

  sidebar.querySelectorAll('.ws-cat__bar').forEach(function (bar) {
    bar.addEventListener('click', function () {
      bar.closest('.ws-cat').classList.toggle('is-open');
    });
    bar.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        bar.closest('.ws-cat').classList.toggle('is-open');
      }
    });
  });

  function syncCheckboxes() {
    sidebar.querySelectorAll('input[type="checkbox"][data-series-id]').forEach(function (inp) {
      var id = inp.getAttribute('data-series-id');
      inp.checked = sm.active.has(id);
    });
  }

  sidebar.addEventListener('change', function (e) {
    var t = e.target;
    if (t.type !== 'checkbox' || !t.getAttribute('data-series-id')) return;
    var id = t.getAttribute('data-series-id');
    if (t.checked) sm.addSeries(id);
    else sm.removeSeries(id);
  });

  var elFrom = document.getElementById('ws-from');
  var elTo = document.getElementById('ws-to');
  var elFromB = document.getElementById('ws-from-b');
  var elToB = document.getElementById('ws-to-b');
  var compareToggle = document.getElementById('ws-compare-toggle');
  var compareRow = document.getElementById('ws-compare-row');
  var btnMarker = document.getElementById('ws-add-marker');
  var btnRef = document.getElementById('ws-add-ref');

  function pushDatesToInputs() {
    var d = app.getDates();
    elFrom.value = d.from || '';
    elTo.value = d.to || '';
    elFromB.value = d.fromB || '';
    elToB.value = d.toB || '';
  }

  var app = WS.init({
    chartEl: document.getElementById('ws-chart'),
    tsEl: document.getElementById('term-pipeline-ts'),
    onDatesChange: pushDatesToInputs,
    onModeChange: function () {
      btnMarker.classList.toggle('is-active', app.isWaitingMarker());
    },
  });

  function readDatesFromInputs() {
    app.setDates({
      from: elFrom.value,
      to: elTo.value,
      fromB: elFromB.value,
      toB: elToB.value,
    });
  }

  [elFrom, elTo, elFromB, elToB].forEach(function (inp) {
    inp.addEventListener('change', readDatesFromInputs);
  });

  compareToggle.addEventListener('click', function () {
    var on = !compareToggle.classList.contains('is-on');
    compareToggle.classList.toggle('is-on', on);
    compareToggle.setAttribute('aria-pressed', on ? 'true' : 'false');
    compareRow.classList.toggle('is-visible', on);
    compareRow.setAttribute('aria-hidden', on ? 'false' : 'true');
    app.setCompare(on);
  });

  btnMarker.addEventListener('click', function () {
    var next = !app.isWaitingMarker();
    app.setWaitingMarker(next);
  });

  btnRef.addEventListener('click', function () {
    app.addReferenceLine();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') app.setWaitingMarker(false);
  });

  document.querySelectorAll('.ws-range').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.ws-range').forEach(function (b) { b.classList.remove('is-active'); });
      btn.classList.add('is-active');
      var m = parseInt(btn.getAttribute('data-months'), 10);
      if (m === 1) app.setShortcutMonths(1);
      else if (m === 3) app.setShortcutMonths(3);
      else if (m === 6) app.setShortcutMonths(6);
      else if (m === 12) app.setShortcutMonths(12);
      else if (m === 24) app.setShortcutMonths(24);
    });
  });

  sm.onChange = function () {
    syncCheckboxes();
    app.redraw();
  };

  syncCheckboxes();
  pushDatesToInputs();
})();
  </script>
</body>
</html>
